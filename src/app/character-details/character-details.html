<a class="btn" [routerLink]="['']">Back</a>

@for(char of characters; track char.id){
    <p>Name: {{char.name}}</p>
    <p>Species: {{char.species}}</p>
    <p>House: {{char.house}}</p>
    <p>Is character a wizard: {{char.wizard}}</p>
    <p>Ancestry: {{char.ancestry}}</p>
    <table>
        <tr>
            <th>Wood</th>
            <th>Core</th>
            <th>Length</th>
        </tr>
        <tr>
            <td>{{char.wand.wood}}</td>
            <td>{{char.wand.core}}</td>
            <td>{{char.wand.length}}</td>
        </tr>
    </table>
    <p>Actor: {{char.actor}}</p>
    <img src = {{char.image}}>
}
